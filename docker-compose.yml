services:
  postgres:
    image: postgres:17-alpine
    container_name: chile-devs-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: chile_devs
      POSTGRES_PASSWORD: chile_devs
      POSTGRES_DB: chile_devs
    volumes:
      - chile_devs_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U chile_devs -d chile_devs']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: chile-devs-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  chile_devs_pg_data:
