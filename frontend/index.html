<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>%SITE_NAME%</title>
    <meta name="description" content="%SITE_DESCRIPTION%" />
    <meta name="application-name" content="%SITE_NAME%" />
    <meta name="theme-color" content="#0a0a0a" />
    <link rel="canonical" href="%SITE_URL%/" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />

    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="%SITE_NAME%" />
    <meta property="og:locale" content="%SITE_LOCALE%" />
    <meta property="og:title" content="%SITE_NAME%" />
    <meta property="og:description" content="%SITE_DESCRIPTION%" />
    <meta property="og:url" content="%SITE_URL%/" />
    <meta property="og:image" content="%SITE_URL%/og-image.png" />
    <meta property="og:image:alt" content="%SITE_TAGLINE%" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <meta name="twitter:card" content="%TWITTER_CARD%" />
    <meta name="twitter:title" content="%SITE_NAME%" />
    <meta name="twitter:description" content="%SITE_DESCRIPTION%" />
    <meta name="twitter:image" content="%SITE_URL%/og-image.png" />
    <meta name="twitter:image:alt" content="%SITE_TAGLINE%" />

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "%SITE_NAME%",
        "description": "%SITE_DESCRIPTION%",
        "url": "%SITE_URL%/"
      }
    </script>
    <script>
      (function () {
        var hash = window.location.hash;
        if (!hash.startsWith("#session=")) return;
        var token = decodeURIComponent(hash.slice("#session=".length));
        if (!token) return;
        try {
          localStorage.setItem("chile_devs_session", token);
        } catch (error) {
          console.error("Failed to store auth session", error);
        }
        window.history.replaceState(
          null,
          "",
          window.location.pathname + window.location.search,
        );
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
